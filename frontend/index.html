<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasnat's Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-0:        #0a0b0f;
            --bg-1:        #11131a;
            --bg-2:        #171a23;
            --bg-3:        #1f232e;
            --border:      #262a36;
            --border-soft: #1d2029;
            --text-0:      #f4f5f7;
            --text-1:      #c9ccd5;
            --text-2:      #8a8f9c;
            --text-3:      #5a5f6c;

            --accent:        #6366f1;
            --accent-hover:  #7c7ff5;
            --accent-soft:   rgba(99, 102, 241, 0.12);
            --accent-glow:   rgba(99, 102, 241, 0.35);

            --success:     #22c55e;
            --danger:      #ef4444;

            --radius-sm:   8px;
            --radius-md:   14px;
            --radius-lg:   22px;

            --shadow-lg:   0 24px 60px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.4);
            --shadow-glow: 0 0 0 1px rgba(99,102,241,0.25), 0 8px 32px rgba(99,102,241,0.25);

            --font-main:   'Inter', system-ui, -apple-system, sans-serif;
            --font-mono:   'JetBrains Mono', monospace;
        }

        html, body {
            height: 100%;
            font-family: var(--font-main);
            background: var(--bg-0);
            color: var(--text-0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(900px 500px at 20% 10%, rgba(99,102,241,0.10), transparent 60%),
                radial-gradient(700px 400px at 85% 90%, rgba(168,85,247,0.07), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .chat-window {
            width: 100%;
            max-width: 780px;
            height: 88vh;
            max-height: 880px;
            background: var(--bg-1);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(99,102,241,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
            flex-shrink: 0;
            position: relative;
        }

        .brand-mark svg {
            width: 22px;
            height: 22px;
            color: #fff;
        }

        .brand-mark::after {
            content: "";
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border: 2.5px solid var(--bg-1);
            border-radius: 50%;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-0);
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .header-sub {
            font-size: 12px;
            color: var(--text-2);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--text-1);
            font-weight: 500;
            padding: 6px 12px;
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: 999px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(34,197,94,0.18);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.18); }
            50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0.05); }
        }

        .dept-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 5px;
            margin-bottom: 6px;
            font-family: var(--font-mono);
            border: 1px solid transparent;
        }

        .tag-shipping { background: rgba(34,197,94,0.10);  color: #4ade80; border-color: rgba(34,197,94,0.25); }
        .tag-returns  { background: rgba(249,115,22,0.10); color: #fb923c; border-color: rgba(249,115,22,0.25); }
        .tag-billing  { background: rgba(59,130,246,0.10); color: #60a5fa; border-color: rgba(59,130,246,0.25); }
        .tag-account  { background: rgba(168,85,247,0.10); color: #c084fc; border-color: rgba(168,85,247,0.25); }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 26px 24px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
        .messages::-webkit-scrollbar-thumb:hover { background: var(--border); }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 24px;
            color: var(--text-2);
            gap: 14px;
        }

        .welcome-illustration {
            width: 96px;
            height: 96px;
            margin-bottom: 6px;
            position: relative;
        }

        .welcome-illustration svg {
            width: 100%;
            height: 100%;
        }

        .wb { transform-origin: center; }
        .wb-1 { animation: float-bubble 3.2s ease-in-out infinite; }
        .wb-2 { animation: float-bubble 3.2s ease-in-out infinite 0.5s; }
        .wb-3 { animation: float-bubble 3.2s ease-in-out infinite 1s; }

        @keyframes float-bubble {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.95; }
            50%      { transform: translateY(-3px) scale(1.04); opacity: 1; }
        }

        .ws-spark {
            transform-origin: center;
            animation: spark-pulse 2.4s ease-in-out infinite;
        }

        @keyframes spark-pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50%      { opacity: 1;    transform: scale(1.15); }
        }

        .welcome h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-0);
            letter-spacing: -0.3px;
        }

        .welcome p {
            font-size: 14px;
            line-height: 1.65;
            max-width: 400px;
            color: var(--text-2);
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 14px;
        }

        .chip {
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text-1);
            font-family: var(--font-main);
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.18s ease;
            font-weight: 500;
        }

        .chip:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--text-0);
            transform: translateY(-1px);
        }
        .message-row {
            display: flex;
            gap: 12px;
            animation: fadeUp 0.25s ease;
            align-items: flex-end;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-row.user-row {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
        }

        .msg-avatar.bot-avatar {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            box-shadow: 0 2px 8px rgba(99,102,241,0.35);
        }

        .msg-avatar.bot-avatar svg {
            width: 16px;
            height: 16px;
            color: #fff;
        }

        .msg-avatar.user-avatar {
            background: var(--bg-3);
            border: 1px solid var(--border);
        }

        .user-initial {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-0);
        }

        .bubble-wrap {
            display: flex;
            flex-direction: column;
            max-width: 74%;
        }

        .user-row .bubble-wrap { align-items: flex-end; }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.65;
            word-wrap: break-word;
        }

        .user-row .bubble {
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: #fff;
            border-bottom-right-radius: var(--radius-sm);
            box-shadow: 0 4px 14px rgba(99,102,241,0.25);
        }

        .bot-row .bubble {
            background: var(--bg-2);
            color: var(--text-0);
            border-bottom-left-radius: var(--radius-sm);
            border: 1px solid var(--border-soft);
        }

        .typing-bubble {
            background: var(--bg-2);
            border: 1px solid var(--border-soft);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border-bottom-left-radius: var(--radius-sm);
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-bubble span {
            width: 6px;
            height: 6px;
            background: var(--text-2);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; }
            40%            { opacity: 1; }
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-soft);
            background: var(--bg-1);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #messageInput {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 14px;
            font-family: var(--font-main);
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            color: var(--text-0);
            background: var(--bg-2);
            transition: border-color 0.18s, box-shadow 0.18s;
        }

        #messageInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        #messageInput::placeholder { color: var(--text-3); }

        #sendBtn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.18s;
            box-shadow: 0 4px 14px rgba(99,102,241,0.35);
        }

        #sendBtn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,0.5);
        }

        #sendBtn:active { transform: scale(0.96); }

        #sendBtn:disabled {
            background: var(--bg-3);
            cursor: not-allowed;
            box-shadow: none;
        }

        #sendBtn svg { width: 16px; height: 16px; fill: #fff; }
        #sendBtn:disabled svg { fill: var(--text-3); }

        /* ---- FOOTER ---- */
        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-3);
            padding: 10px 0 12px;
            flex-shrink: 0;
            letter-spacing: 0.2px;
        }

        .footer-note strong {
            color: var(--text-1);
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .page { padding: 0; }
            .chat-window { height: 100vh; max-height: none; border-radius: 0; border: none; }
        }
    </style>
</head>

<body>
<div class="page">
<div class="chat-window">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <div class="brand-mark" aria-hidden="true">
                <!-- Chat + spark mark -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 11.5C3 7.35786 6.35786 4 10.5 4H13.5C17.6421 4 21 7.35786 21 11.5C21 15.6421 17.6421 19 13.5 19H8.5L4.5 22V18.5C3.55719 17.5 3 15.5 3 13.5V11.5Z"
                          stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M14.5 8L15.4 10.6L18 11.5L15.4 12.4L14.5 15L13.6 12.4L11 11.5L13.6 10.6L14.5 8Z"
                          fill="currentColor"/>
                </svg>
            </div>
            <div>
                <div class="header-title">Hasnat's Chatbot</div>
                <div class="header-sub">AI Customer Support Assistant</div>
            </div>
        </div>
        <div class="status-pill">
            <div class="status-dot"></div>
            Online
        </div>
    </div>

    <div class="messages" id="messages">

        <div class="welcome" id="welcome">
            <div class="welcome-illustration" aria-hidden="true">
                <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="wbGrad" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#8b5cf6"/>
                        </linearGradient>
                        <linearGradient id="wbGrad2" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#1f232e"/>
                            <stop offset="100%" stop-color="#262a36"/>
                        </linearGradient>
                    </defs>

                    <g class="wb wb-2">
                        <rect x="58" y="22" width="46" height="34" rx="12" fill="url(#wbGrad2)" stroke="#2f3442" stroke-width="1"/>
                        <circle cx="72" cy="39" r="2" fill="#8a8f9c"/>
                        <circle cx="81" cy="39" r="2" fill="#8a8f9c"/>
                        <circle cx="90" cy="39" r="2" fill="#8a8f9c"/>
                    </g>

                    
                    <g class="wb wb-1">
                        <path d="M16 50C16 38.954 24.954 30 36 30H68C79.046 30 88 38.954 88 50V62C88 73.046 79.046 82 68 82H44L30 92V80C22 78 16 70 16 62V50Z"
                              fill="url(#wbGrad)"/>
                        <!-- Spark inside -->
                        <g class="ws-spark" transform="translate(52 56)">
                            <path d="M0 -10L2.5 -2.5L10 0L2.5 2.5L0 10L-2.5 2.5L-10 0L-2.5 -2.5Z" fill="#fff"/>
                        </g>
                    </g>

                    <g class="wb wb-3">
                        <circle cx="98" cy="78" r="10" fill="url(#wbGrad)" opacity="0.85"/>
                        <circle cx="95" cy="78" r="1.5" fill="#fff"/>
                        <circle cx="98" cy="78" r="1.5" fill="#fff"/>
                        <circle cx="101" cy="78" r="1.5" fill="#fff"/>
                    </g>
                </svg>
            </div>
            <h3>How can I help you today?</h3>
            <p>Ask me anything about your orders, returns, payments or account. I'll route your question to the right specialist.</p>
            <div class="suggestions">
                <button class="chip" onclick="suggest('Where is my order?')">Where is my order?</button>
                <button class="chip" onclick="suggest('How do I return an item?')">How do I return an item?</button>
                <button class="chip" onclick="suggest('My payment failed')">My payment failed</button>
                <button class="chip" onclick="suggest('I forgot my password')">I forgot my password</button>
            </div>
        </div>

    </div>

    <div class="input-area">
        <textarea
            id="messageInput"
            placeholder="Type a message..."
            rows="1"
        ></textarea>
        <button id="sendBtn" onclick="sendMessage()" aria-label="Send message">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
            </svg>
        </button>
    </div>

    <div class="footer-note">Designed by <strong>Hasnat Ahmad</strong></div>

</div>
</div>

<script>

    const API = "http://localhost:8000";
    let sessionId = null;
    let isStreaming = false;

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("messageInput");
    const sendBtn    = document.getElementById("sendBtn");

    const BOT_AVATAR_SVG = `
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 11.5C3 7.35786 6.35786 4 10.5 4H13.5C17.6421 4 21 7.35786 21 11.5C21 15.6421 17.6421 19 13.5 19H8.5L4.5 22V18.5C3.55719 17.5 3 15.5 3 13.5V11.5Z"
                  stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M14.5 8L15.4 10.6L18 11.5L15.4 12.4L14.5 15L13.6 12.4L11 11.5L13.6 10.6L14.5 8Z"
                  fill="currentColor"/>
        </svg>`;

    inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function suggest(text) {
        inputEl.value = text;
        sendMessage();
    }

    async function initSession() {
        const stored = localStorage.getItem("chatbot_session_id");

        if (stored) {
            try {
                const res = await fetch(`${API}/history/${stored}`);
                if (res.ok) {
                    sessionId = stored;
                    const data = await res.json();
                    if (data.messages && data.messages.length > 0) {
                        hideWelcome();
                        data.messages.forEach(msg => {
                            addMessage(msg.content, msg.role, msg.category || "");
                        });
                        scrollToBottom();
                    }
                    return;
                }
            } catch (e) { /* fall through */ }
        }

        try {
            const res  = await fetch(`${API}/session`, { method: "POST" });
            const data = await res.json();
            sessionId  = data.session_id;
            localStorage.setItem("chatbot_session_id", sessionId);
        } catch (e) {
            console.error("Failed to create session:", e);
        }
    }

    function hideWelcome() {
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();
    }

    function buildAvatar(role) {
        const avatarEl = document.createElement("div");
        if (role === "user") {
            avatarEl.className = "msg-avatar user-avatar";
            const initial = document.createElement("span");
            initial.className = "user-initial";
            initial.textContent = "U";
            avatarEl.appendChild(initial);
        } else {
            avatarEl.className = "msg-avatar bot-avatar";
            avatarEl.innerHTML = BOT_AVATAR_SVG;
        }
        return avatarEl;
    }

    function addMessage(content, role, category = "") {
        hideWelcome();

        const row = document.createElement("div");
        row.className = `message-row ${role === "user" ? "user-row" : "bot-row"}`;

        const avatarEl = buildAvatar(role);

        const wrap = document.createElement("div");
        wrap.className = "bubble-wrap";

        if (role === "assistant" && category) {
            const tag = document.createElement("div");
            tag.className = `dept-tag tag-${category}`;
            const labels = {
                shipping: "Shipping",
                returns:  "Returns",
                billing:  "Billing",
                account:  "Account"
            };
            tag.textContent = labels[category] || category;
            wrap.appendChild(tag);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = content.replace(/\n/g, "<br>");

        wrap.appendChild(bubble);
        row.appendChild(avatarEl);
        row.appendChild(wrap);
        messagesEl.appendChild(row);
        scrollToBottom();

        return bubble;
    }

    function addStreamingMessage(category) {
        hideWelcome();

        const row = document.createElement("div");
        row.className = "message-row bot-row";
        row.id = "streaming-row";

        const avatarEl = buildAvatar("assistant");

        const wrap = document.createElement("div");
        wrap.className = "bubble-wrap";

        if (category) {
            const tag = document.createElement("div");
            tag.className = `dept-tag tag-${category}`;
            const labels = { shipping:"Shipping", returns:"Returns", billing:"Billing", account:"Account" };
            tag.textContent = labels[category] || category;
            wrap.appendChild(tag);
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.id = "streaming-bubble";

        wrap.appendChild(bubble);
        row.appendChild(avatarEl);
        row.appendChild(wrap);
        messagesEl.appendChild(row);
        scrollToBottom();

        return bubble;
    }

    function showTyping() {
        const row = document.createElement("div");
        row.className = "message-row bot-row";
        row.id = "typing-row";

        const avatarEl = buildAvatar("assistant");

        const wrap = document.createElement("div");
        wrap.className = "bubble-wrap";

        const bubble = document.createElement("div");
        bubble.className = "typing-bubble";
        bubble.innerHTML = "<span></span><span></span><span></span>";

        wrap.appendChild(bubble);
        row.appendChild(avatarEl);
        row.appendChild(wrap);
        messagesEl.appendChild(row);
        scrollToBottom();
    }

    function hideTyping() {
        const t = document.getElementById("typing-row");
        if (t) t.remove();
    }

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isStreaming || !sessionId) return;

        inputEl.value = "";
        inputEl.style.height = "auto";

        addMessage(text, "user");

        isStreaming = true;
        sendBtn.disabled = true;

        showTyping();

        let streamingBubble = null;
        let fullText = "";

        try {
            const res = await fetch(`${API}/chat/stream`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    session_id:   sessionId,
                    user_message: text
                })
            });

            if (!res.ok) throw new Error("Server error");

            const reader  = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer    = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith("data: ")) continue;

                    try {
                        const event = JSON.parse(line.slice(6));

                        if (event.type === "category") {
                            hideTyping();
                            streamingBubble = addStreamingMessage(event.content);

                        } else if (event.type === "chunk") {
                            if (!streamingBubble) {
                                hideTyping();
                                streamingBubble = addStreamingMessage("");
                            }
                            fullText += event.content;
                            streamingBubble.innerHTML = fullText.replace(/\n/g, "<br>");
                            scrollToBottom();

                        } else if (event.type === "done") {
                            break;

                        } else if (event.type === "error") {
                            hideTyping();
                            addMessage(event.content, "assistant", "");
                        }
                    } catch (e) { /* skip malformed chunk */ }
                }
            }

        } catch (err) {
            hideTyping();
            addMessage("Connection error. Please check that the server is running.", "assistant");
            console.error("Stream error:", err);
        }

        isStreaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
    }

    initSession();
</script>
</body>
</html>
